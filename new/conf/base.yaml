num_rounds: 35
num_clients: 30
batch_size: 20
num_classes: 10

num_edges: 3
clients_per_edge: 10
clients_per_edge_per_round: 5

config_fit:
  lr: 0.01
  momentum: 0.9
  local_epochs: 3

# 추가 (RL용)
warmup_rounds: 2        # 처음 2라운드는 랜덤
k_select: 5             # 선택할 클라이언트 수 (clients_per_edge_per_round랑 맞추기)
state_size: 50          # 10 clients × 5 features